name: build-android

# 云端构建安卓 APK(arm64,debug 签名可直装):
# 手动触发;传 tag 则同时挂到该 Release,否则只出 artifact

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "可选:上传到哪个 release tag (如 v1.3.0);留空只出 artifact"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: 复用核心源码 + 下载安卓版 xray
        run: |
          cp -r app android/app/src/main/python/app
          curl -sL -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip
          mkdir -p xrayx android/app/src/main/jniLibs/arm64-v8a
          unzip -q xray.zip -d xrayx
          cp xrayx/xray android/app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Gradle 构建 APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: 重命名产物
        id: apk
        run: |
          VER=$(grep versionName android/app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          OUT="feiying-android_${VER}_arm64.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$OUT"
          echo "file=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: feiying-android-apk
          path: ${{ steps.apk.outputs.file }}

      - name: 启用 KVM(模拟器加速)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 模拟器冒烟测试(装APK→起服务→页面200)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_4
          disable-animations: true
          script: bash android/ci-smoke.sh "${{ steps.apk.outputs.file }}"

      - name: 挂到 Release(可选)
        if: inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" "${{ steps.apk.outputs.file }}" --clobber --repo ${{ github.repository }}
